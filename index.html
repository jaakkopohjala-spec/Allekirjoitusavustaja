<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Allekirjoitusavustin</title>
  <script>
    window.Module = {
      onRuntimeInitialized: function () {
        if (typeof markCvReady === "function") markCvReady();
        else window._cvReadyPending = true;
      }
    };
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505; --panel: #151515; --text: #fff;
      --muted: #bbb; --good: #00e676; --warn: #ffd54f; --bad: #ff5252;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; }
    header { padding: 12px 14px 10px; background: var(--panel); border-bottom: 1px solid #333; flex-shrink: 0; }
    h1 { font-size: 1.05rem; margin-bottom: 7px; }
    #status { font-size: 1.25rem; font-weight: 750; padding: 8px 12px; border-radius: 10px;
      background: #1e1e1e; border: 2px solid #555; line-height: 1.25; }
    #status.good { border-color: var(--good); }
    #status.warn { border-color: var(--warn); }
    #status.bad  { border-color: var(--bad); }
    #ariaAnnounce { position: absolute; width: 1px; height: 1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; }
    main { position: relative; flex: 1; min-height: 0; background: #000; }
    video, #overlay { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
    #overlay { z-index: 2; pointer-events: none; }
    #debugCanvas { display: none; position: absolute; top: 0; left: 0; z-index: 3;
      width: 50%; height: auto; opacity: 0.85; }
    #controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      padding: 10px 14px 14px; background: var(--panel); border-top: 1px solid #333; flex-shrink: 0; }
    button { min-height: 46px; border: 2px solid #666; border-radius: 10px; background: #222;
      color: #fff; font-size: .95rem; font-weight: 700; cursor: pointer; }
    button:active { transform: scale(.97); }
    .wide { grid-column: 1/-1; }
    #phaseInfo { grid-column: 1/-1; font-size: .82rem; color: var(--muted); line-height: 1.35; }
  </style>
</head>
<body>
  <header>
    <h1>Allekirjoitusavustin</h1>
    <div id="status" class="warn">Paina Aloita kamera</div>
    <div id="ariaAnnounce" role="status" aria-live="assertive" aria-atomic="true"></div>
  </header>
  <main>
    <video id="video" playsinline muted></video>
    <canvas id="overlay"></canvas>
    <canvas id="debugCanvas"></canvas>
  </main>
  <section id="controls" aria-label="Ohjaimet">
    <button id="startBtn">Aloita kamera</button>
    <button id="resetBtn">Etsi uudelleen</button>
    <button id="speakBtn" aria-pressed="true">Puhe päällä</button>
    <button id="vibrateBtn" aria-pressed="true">Värinä päällä</button>
    <button id="debugBtn" aria-pressed="false" class="wide">Debug pois</button>
    <div id="phaseInfo">
      Vaihe 1: siirrä kamera niin että allekirjoitusviiva (Jaakko Pohjala) näkyy keskellä.
      Vaihe 2: tuo tumma kynä tai paperiveitsi kuvan näkyviin — sovellus ohjaa kärjen viivan vasempaan päähän.
    </div>
  </section>

  <script src="https://docs.opencv.org/4.x/opencv.js"></script>
  <script>
  "use strict";

  // ── Elementit ──────────────────────────────────────────────────────────────
  const video       = document.getElementById("video");
  const overlay     = document.getElementById("overlay");
  const ctx         = overlay.getContext("2d");
  const debugCanvas = document.getElementById("debugCanvas");
  const statusEl    = document.getElementById("status");
  const ariaEl      = document.getElementById("ariaAnnounce");
  const startBtn    = document.getElementById("startBtn");
  const resetBtn    = document.getElementById("resetBtn");
  const speakBtn    = document.getElementById("speakBtn");
  const vibrateBtn  = document.getElementById("vibrateBtn");
  const debugBtn    = document.getElementById("debugBtn");

  // ── Tila ───────────────────────────────────────────────────────────────────
  let stream = null, running = false, cvReady = false;
  let speechOn = true, vibrateOn = true, debugOn = false;
  let mode = "searchLine";   // searchLine | confirmLine | guidePen
  let lockedLine   = null;
  let smoothedLine = null;
  let stableFrames = 0;
  let prevGray     = null;
  let lastPenSeen  = null;    // { tip, seenAt }
  let penMissFrames = 0;
  let nearTargetFrames = 0;

  let lastAriaText = "", lastAriaAt = 0, lastSpeakAt = 0, lastSpoken = "";
  let lastVibrateAt = 0;

  // Prosessointiresoluutio
  const PW = 640;

  // ── Vakiot ─────────────────────────────────────────────────────────────────
  // Kynänkärjen tunnistus: tummuuskynnys (0-255). Kynä/paperiveitsi tulee olla
  // tätä tummempi tai kirkkaampi kuin tausta PLUS liikkuva.
  // Kynä (tumma): alla DARK_THRESH. Paperiveitsi (metalli/hopea): KONTRASTI liikkuessa.
  const DARK_THRESH     = 100;   // alle tämän = tumma esine (kynä)
  const BRIGHT_THRESH   = 195;   // yli tämän JA liikkuva = metallinen (paperiveitsi)
  const MOTION_THRESH   = 18;    // liikepikselien kynnys

  // Kynäohjauksen käynnistyminen: tarvitaan tämä määrä perättäisiä kuviajoissa
  // kynä/esine ENNEN kuin ohjaus alkaa (estää väärät laukaisut)
  const PEN_REQUIRED_FRAMES = 8;
  let penConfirmFrames = 0;      // esine näkyy jo ennen kuin ohjaus alkaa

  const CENTER_TOL_X   = 0.10;
  const CENTER_TOL_Y   = 0.12;
  const READY_FRAMES   = 10;
  const SPEAK_MS       = 1800;
  const ARIA_MS        = 2200;

  // ── Ääni/puheavusteet ─────────────────────────────────────────────────────

  function setStatus(text, tone) {
    statusEl.textContent = text;
    statusEl.className   = tone || "warn";
  }

  function announceAria(text, force) {
    const now = Date.now();
    if (!force && text === lastAriaText) return;
    if (!force && now - lastAriaAt < ARIA_MS) return;
    lastAriaText = text; lastAriaAt = now;
    ariaEl.textContent = "";
    setTimeout(() => { ariaEl.textContent = text; }, 50);
  }

  function speak(text, force) {
    if (!speechOn) return;
    const now = Date.now();
    if (!force && text === lastSpoken) return;
    if (!force && now - lastSpeakAt < SPEAK_MS) return;
    lastSpoken = text; lastSpeakAt = now;
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "fi-FI"; u.rate = 1.1;
      speechSynthesis.speak(u);
    } catch(_) {}
  }

  function vibrate(pat) {
    if (!vibrateOn || !navigator.vibrate) return;
    const now = Date.now();
    if (now - lastVibrateAt < 600) return;
    lastVibrateAt = now;
    navigator.vibrate(pat);
  }

  function announce(display, aria, tone, force) {
    setStatus(display, tone || "warn");
    announceAria(aria, force);
    speak(aria, force);
  }

  // ── Canvas-koko ───────────────────────────────────────────────────────────

  function resizeOverlay() {
    const r   = video.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    overlay.width  = Math.max(1, Math.round(r.width  * dpr));
    overlay.height = Math.max(1, Math.round(r.height * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // ── Kameran käynnistys ────────────────────────────────────────────────────

  async function startCamera() {
    if (!cvReady) {
      announce("Ladataan — yritä hetken päästä", "Ladataan", "warn", true);
      return;
    }
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      video.addEventListener("loadedmetadata", resizeOverlay, { once: true });
      await video.play();
      resizeOverlay();
      resetAll(false);
      running = true;
      announce("Etsitään allekirjoitusviivaa", "Etsitään viivaa", "warn", true);
      setTimeout(loop, 100);
    } catch(e) {
      console.error(e);
      announce("Kameraa ei saatu — tarkista lupa", "Kamera ei toimi", "bad", true);
    }
  }

  function resetAll(doAnnounce) {
    mode = "searchLine";
    lockedLine = null; smoothedLine = null; stableFrames = 0;
    lastPenSeen = null; penMissFrames = 0; penConfirmFrames = 0; nearTargetFrames = 0;
    lastAriaText = "";
    if (prevGray) { prevGray.delete(); prevGray = null; }
    if (doAnnounce) announce("Etsitään allekirjoitusviivaa", "Etsitään viivaa", "warn", true);
  }

  // ── Pääsilmukka ───────────────────────────────────────────────────────────

  function loop() {
    if (!running) return;
    if (video.readyState < 2) { setTimeout(loop, 100); return; }
    try {
      const frame = grabFrame();
      if (frame) {
        if (mode === "guidePen") {
          handlePenGuidance(frame);
        } else {
          const line = detectSignatureLine(frame);
          handleLineDetection(line);
        }
        frame.src.delete();
        frame.gray.delete();
        frame.blur.delete();
      }
    } catch(e) {
      console.error(e);
    }
    setTimeout(loop, 100);
  }

  // ── Kuvan kaappaus ────────────────────────────────────────────────────────

  function grabFrame() {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) return null;
    const s = PW / vw;
    const pw = PW, ph = Math.round(vh * s);
    debugCanvas.width = pw; debugCanvas.height = ph;
    const dc = debugCanvas.getContext("2d", { willReadFrequently: true });
    dc.drawImage(video, 0, 0, pw, ph);
    const src  = cv.imread(debugCanvas);
    const gray = new cv.Mat();
    const blur = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray, blur, new cv.Size(5,5), 0);
    return { src, gray, blur, pw, ph, s };
  }

  // ── Paperin havaitseminen ─────────────────────────────────────────────────
  // Etsitään suurin vaalea (paperi) alue kuvasta.
  // Palautuu { x, y, w, h } tai null.

  function detectPaper(frame) {
    const white = new cv.Mat();
    const kernel = cv.Mat.ones(15, 15, cv.CV_8U);
    const closed = new cv.Mat();
    const contours  = new cv.MatVector();
    const hierarchy = new cv.Mat();
    try {
      cv.threshold(frame.gray, white, 170, 255, cv.THRESH_BINARY);
      cv.morphologyEx(white, closed, cv.MORPH_CLOSE, kernel);
      cv.findContours(closed, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
      let best = null, bestArea = 0;
      for (let i = 0; i < contours.size(); i++) {
        const c    = contours.get(i);
        const area = cv.contourArea(c);
        if (area > bestArea) { bestArea = area; best = cv.boundingRect(c); }
        c.delete();
      }
      // Paperin täytyy olla vähintään 15 % kuvasta
      if (!best || bestArea < frame.pw * frame.ph * 0.15) return null;
      return best;
    } finally {
      white.delete(); kernel.delete(); closed.delete();
      contours.delete(); hierarchy.delete();
    }
  }

  // ── Allekirjoitusviivan tunnistus ─────────────────────────────────────────
  //
  // UUSI STRATEGIA:
  // 1) Tunnistetaan paperi ensin → rajoitetaan haku paperin sisälle
  // 2) Käytetään adaptivethresholdia + morfologista OPEN-operaatiota
  //    pitkällä vaakakernelillä — tämä poistaa lyhyet kirjainpalaset
  //    mutta säilyttää pitkät yhtenäiset viivat (allekirjoitusviiva)
  // 3) Valitaan alin (suurin Y-arvo) riittävän pitkä viiva
  //    — allekirjoitusviiva on paperin alaosassa, tekstirivit ylempänä

  function detectSignatureLine(frame) {
    const paper = detectPaper(frame);
    if (!paper) return null;

    // ROI = paperin sisäinen alue (pieni margin)
    const margin = 5;
    const rx = Math.max(0, paper.x + margin);
    const ry = Math.max(0, paper.y + margin);
    const rw = Math.min(frame.pw - rx, paper.width  - 2 * margin);
    const rh = Math.min(frame.ph - ry, paper.height - 2 * margin);
    if (rw < 50 || rh < 50) return null;

    // Cropataan ROI paperin sisältä
    const roiRect = new cv.Rect(rx, ry, rw, rh);
    const roiMat  = frame.blur.roi(roiRect);

    const edges = new cv.Mat();
    const lines = new cv.Mat();
    try {
      cv.Canny(roiMat, edges, 35, 110, 3, false);

      // Minimipituus: 22 % paperin leveydestä — allekirjoitusviiva on pitkä
      const minLen = Math.round(rw * 0.22);
      cv.HoughLinesP(edges, lines, 1, Math.PI / 180, 30, minLen, 10);

      // Kerätään kaikki kelpaavat vaakaviivat
      const candidates = [];
      for (let i = 0; i < lines.rows; i++) {
        const x1 = lines.data32S[i*4]     + rx;
        const y1 = lines.data32S[i*4 + 1] + ry;
        const x2 = lines.data32S[i*4 + 2] + rx;
        const y2 = lines.data32S[i*4 + 3] + ry;
        const dx = x2 - x1, dy = y2 - y1;
        const len = Math.hypot(dx, dy);
        const angle = Math.abs(Math.atan2(dy, dx) * 180 / Math.PI);
        const hangle = Math.min(angle, Math.abs(180 - angle));

        // Tiukat kriteerit: lähes vaakasuora (≤6°), riittävän pitkä
        if (hangle > 6) continue;

        const cy = (y1 + y2) / 2;
        const cx = (x1 + x2) / 2;

        // Suhteellinen sijainti paperin sisällä (0=ylhäällä, 1=alhaalla)
        const yRel = (cy - paper.y) / paper.height;

        // PISTEYTYS:
        // - Allekirjoitusviiva on paperin alemmassa puoliskossa → yRel bonus
        // - Pituus palkitaan
        // - Ylin 30 % paperista rangaistaan voimakkaasti (tekstiotsikot)
        const yBonus = yRel > 0.50 ? (1.0 + yRel) :   // alempi puoli: bonus
                       yRel > 0.30 ? 0.6 :              // keskialue: neutraali
                                     0.2;                // yläosa: rangaistus
        const score = len * yBonus;

        candidates.push({ x1, y1, x2, y2, cx, cy, len, angle: hangle, yRel, score });
      }

      if (candidates.length === 0) return null;

      // Valitaan paras pisteet saava
      candidates.sort((a, b) => b.score - a.score);
      const best = candidates[0];

      // Varmistetaan suunta (x1 < x2)
      const lx1 = best.x1 <= best.x2 ? best.x1 : best.x2;
      const ly1 = best.x1 <= best.x2 ? best.y1 : best.y2;
      const lx2 = best.x1 <= best.x2 ? best.x2 : best.x1;
      const ly2 = best.x1 <= best.x2 ? best.y2 : best.y1;

      return {
        x1: lx1 / frame.s, y1: ly1 / frame.s,
        x2: lx2 / frame.s, y2: ly2 / frame.s,
        cx: best.cx / frame.s, cy: best.cy / frame.s,
        length: best.len / frame.s,
        angle: best.angle, yRel: best.yRel, score: best.score,
        paper: {
          x: paper.x / frame.s, y: paper.y / frame.s,
          w: paper.width / frame.s, h: paper.height / frame.s
        }
      };
    } finally {
      roiMat.delete();
      edges.delete();
      lines.delete();
    }
  }

  // ── Viivan eksponentiaalinen suodatus ─────────────────────────────────────

  function updateSmoothedLine(raw) {
    if (!raw) {
      // Ei havaintoa — nollataan laskuri mutta säilytetään edellinen hetken
      if (stableFrames > 0) stableFrames = Math.max(0, stableFrames - 2);
      if (stableFrames === 0) smoothedLine = null;
      return smoothedLine;
    }
    if (!smoothedLine) {
      smoothedLine = Object.assign({}, raw);
      stableFrames = 1;
      return smoothedLine;
    }
    // Hyppäystarkistus: jos viiva siirtyy >15 % paperin leveydestä, aloitetaan alusta
    const jump = Math.hypot(raw.cx - smoothedLine.cx, raw.cy - smoothedLine.cy);
    const jumpLimit = video.videoWidth * 0.15;
    if (jump > jumpLimit) {
      smoothedLine = Object.assign({}, raw);
      stableFrames = 1;
      return smoothedLine;
    }
    const a = 0.30;
    for (const k of ["x1","y1","x2","y2","cx","cy","length","angle"]) {
      smoothedLine[k] = smoothedLine[k] * (1-a) + raw[k] * a;
    }
    smoothedLine.yRel  = raw.yRel;
    smoothedLine.paper = raw.paper;
    stableFrames++;
    return smoothedLine;
  }

  // ── Viivan käsittely (vaihe 1) ────────────────────────────────────────────

  function handleLineDetection(raw) {
    const line = updateSmoothedLine(raw);
    if (!line) {
      announce("Viivaa ei näy — siirrä kamera", "Viivaa ei näy", "bad");
      drawOverlay({ mode: "none" });
      return;
    }

    const vw = video.videoWidth, vh = video.videoHeight;
    const dx = line.cx - vw / 2;
    const dy = line.cy - vh / 2;
    const tolX = vw * CENTER_TOL_X;
    const tolY = vh * CENTER_TOL_Y;
    const centered = Math.abs(dx) <= tolX && Math.abs(dy) <= tolY;

    if (!centered) {
      let display, aria;
      if (Math.abs(dx) > Math.abs(dy)) {
        display = dx < 0 ? "◀ Vasemmalle" : "Oikealle ▶";
        aria    = dx < 0 ? "Vasemmalle"   : "Oikealle";
        vibrate([30]);
      } else {
        display = dy < 0 ? "▲ Ylöspäin" : "▼ Alaspäin";
        aria    = dy < 0 ? "Ylöspäin"   : "Alaspäin";
        vibrate([30, 50, 30]);
      }
      stableFrames = Math.min(stableFrames, READY_FRAMES - 1);
      announce(display, aria, "warn");
      drawOverlay({ mode: "line", line, tone: "warn" });
      return;
    }

    // Viiva on keskellä
    if (stableFrames >= READY_FRAMES + 5) {
      // Siirrytään kynäohjausvaiheeseen
      lockedLine = Object.assign({}, line);
      mode = "guidePen";
      penConfirmFrames = 0; penMissFrames = 0; nearTargetFrames = 0; lastPenSeen = null;
      lastAriaText = "";
      announce("Kynäohjaus alkaa", "Kynäohjaus alkaa", "good", true);
      vibrate([80, 80, 80]);
      drawOverlay({ mode: "guidePen", line: lockedLine, target: computeTarget(lockedLine), pen: null });
      return;
    }
    vibrate([60]);
    const display = stableFrames >= READY_FRAMES ? "Viiva keskellä ✓" : "Viiva näkyy…";
    const aria    = stableFrames >= READY_FRAMES ? "Hyvä"              : "Viiva näkyy";
    announce(display, aria, "good");
    drawOverlay({ mode: "line", line, tone: "good" });
  }

  // ── Kohdepisteen laskenta ─────────────────────────────────────────────────
  // Kohde on 2 cm viivan yläpuolella vasemmassa reunassa.
  // Offset lasketaan pikseleinä paperin korkeuteen suhteutettuna:
  // tyypillinen A4 paperissa 2 cm ≈ 7 % paperin korkeudesta.

  function computeTarget(line) {
    const dx = line.x2 - line.x1;
    const dy = line.y2 - line.y1;
    const len = Math.max(1, Math.hypot(dx, dy));

    // Normaali ylöspäin
    let nx = -dy / len, ny = dx / len;
    if (ny > 0) { nx = -nx; ny = -ny; }

    // 2 cm offset: käytetään paperin korkeutta referenssinä
    const paperH = line.paper ? line.paper.h : video.videoHeight;
    const offsetPx = paperH * 0.07;   // ~7 % paperista ≈ 2 cm A4:lla

    // Piste viivan vasemmasta päästä pieni sisennnys
    const inset = Math.max(4, Math.min(20, len * 0.02));

    return {
      x: line.x1 + inset + nx * offsetPx,
      y: line.y1          + ny * offsetPx,
      radius: Math.max(12, Math.min(30, len * 0.06))
    };
  }

  // ── Kynänkärjen tunnistus ─────────────────────────────────────────────────
  //
  // UUSI STRATEGIA:
  // Hyväksytään sekä tumma (kynä) että metallinen/kirkas (paperiveitsi) esine.
  // Molemmat täytyy olla liikkuvia (liikemaski) PAITSI kun ovat lähellä kohdetta.
  //
  // Kynä: pikselit alle DARK_THRESH
  // Paperiveitsi: pikselit yli BRIGHT_THRESH (heijastava metalli) TAI vahva liike
  //
  // Esine hyväksytään vasta kun PEN_REQUIRED_FRAMES perättäistä havainnetta —
  // tämä estää tekstirivien tai varjojen virhelaukaisun.

  function detectPointer(frame, target, line) {
    const currGray = frame.gray;
    const scale    = frame.s;

    let motion = new cv.Mat();
    let darkM  = new cv.Mat();
    let lightM = new cv.Mat();
    let combined = new cv.Mat();
    let kernel   = cv.Mat.ones(3, 3, cv.CV_8U);
    let contours = new cv.MatVector();
    let hier     = new cv.Mat();

    try {
      if (!prevGray) { prevGray = currGray.clone(); return null; }

      // Liikemaski
      const diff = new cv.Mat();
      cv.absdiff(currGray, prevGray, diff);
      cv.threshold(diff, motion, MOTION_THRESH, 255, cv.THRESH_BINARY);
      diff.delete();

      // Tummuusmaski (kynä)
      cv.threshold(currGray, darkM, DARK_THRESH, 255, cv.THRESH_BINARY_INV);

      // Kirkkausmaski (paperiveitsi / metallinen esine)
      cv.threshold(currGray, lightM, BRIGHT_THRESH, 255, cv.THRESH_BINARY);

      // Yhdistetty: (tumma TAI kirkas) JA liikkuva
      // ... tai lähellä kohdetta (nearTargetFrames): pelkkä tummuus riittää
      if (nearTargetFrames > 0) {
        // Pysähtynyt esine: käytä vain tummuusmaskia (kynä) tai kirkkausmaskia (veitsi)
        cv.bitwise_or(darkM, lightM, combined);
      } else {
        const darkAndMoving  = new cv.Mat();
        const lightAndMoving = new cv.Mat();
        cv.bitwise_and(darkM,  motion, darkAndMoving);
        cv.bitwise_and(lightM, motion, lightAndMoving);
        cv.bitwise_or(darkAndMoving, lightAndMoving, combined);
        darkAndMoving.delete();
        lightAndMoving.delete();
      }

      cv.morphologyEx(combined, combined, cv.MORPH_CLOSE, kernel);
      cv.dilate(combined, combined, kernel, new cv.Point(-1,-1), 1);

      prevGray.delete();
      prevGray = currGray.clone();

      cv.findContours(combined, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

      // Kohde- ja viivapisteet skaalattuna prosessointiresoluutioon
      const tx    = target.x * scale;
      const ty    = target.y * scale;
      const lineY = ((line.y1 + line.y2) / 2) * scale;

      let best = null;

      for (let i = 0; i < contours.size(); i++) {
        const c    = contours.get(i);
        const area = cv.contourArea(c);

        // Minimipinta-ala: poistetaan kohina
        if (area < 20 || area > frame.pw * frame.ph * 0.10) { c.delete(); continue; }

        const r = cv.boundingRect(c);
        const long  = Math.max(r.width, r.height);
        const short = Math.max(1, Math.min(r.width, r.height));
        const elong = long / short;

        // Kynä/veitsi on pitkänomainen
        if (long < 12 || elong < 1.3) { c.delete(); continue; }

        const cx = r.x + r.width  / 2;
        const cy = r.y + r.height / 2;

        // Suositaan esineitä jotka ovat lähellä tai viivan yläpuolella
        // (ei paperin reunoilla tai alhaalla)
        const aboveLinePref = cy < lineY + frame.ph * 0.10 ? 1.0 : 0.4;

        // Etsitään konturin piste, joka on lähimpänä kohdetta → kärki
        let tipPt = { x: cx, y: cy };
        let minD  = Infinity;
        for (let j = 0; j < c.data32S.length; j += 2) {
          const px = c.data32S[j], py = c.data32S[j+1];
          const d  = Math.hypot(px - tx, py - ty);
          if (d < minD) { minD = d; tipPt = { x: px, y: py }; }
        }

        const score = (area * Math.min(elong, 6) * aboveLinePref) / Math.max(15, minD);
        if (!best || score > best.score) {
          best = {
            score, area,
            tip: { x: tipPt.x / scale, y: tipPt.y / scale },
            dist: minD / scale
          };
        }
        c.delete();
      }

      // Muistiviive: jos esine hävisi juuri, käytetään viimeistä sijaintia 700 ms
      if (!best && lastPenSeen && Date.now() - lastPenSeen.seenAt < 700) {
        return lastPenSeen;
      }
      if (best) best.seenAt = Date.now();
      return best;

    } finally {
      motion.delete(); darkM.delete(); lightM.delete();
      combined.delete(); kernel.delete(); contours.delete(); hier.delete();
    }
  }

  // ── Kynäohjausvaihe (vaihe 2) ────────────────────────────────────────────

  function handlePenGuidance(frame) {
    // Päivitetään lukittu viiva kevyesti jos uusi havainto löytyy
    const rawLine = detectSignatureLine(frame);
    if (rawLine) {
      const jump = Math.hypot(rawLine.cx - lockedLine.cx, rawLine.cy - lockedLine.cy);
      if (jump < video.videoWidth * 0.12) {
        const a = 0.08;
        for (const k of ["x1","y1","x2","y2","cx","cy","length","angle"]) {
          lockedLine[k] = lockedLine[k] * (1-a) + rawLine[k] * a;
        }
        if (rawLine.paper) lockedLine.paper = rawLine.paper;
      }
    }

    const target = computeTarget(lockedLine);
    const ptr    = detectPointer(frame, target, lockedLine);

    if (!ptr) {
      penConfirmFrames = 0;
      penMissFrames++;
      nearTargetFrames = 0;
      const display = penMissFrames > 15 ? "Tuo kynä tai veitsi näkyviin" : "Tuo esine näkyviin";
      const aria    = penMissFrames > 15 ? "Tuo kynä" : "Tuo esine";
      announce(display, aria, "warn");
      drawOverlay({ mode: "guidePen", line: lockedLine, target, pen: null });
      return;
    }

    lastPenSeen = ptr;

    // Vahvistusjakso: odotetaan PEN_REQUIRED_FRAMES ennen kuin aletaan antaa ohjeita
    // Tämä estää väärälaukaisut (varjot, tekstirivit jne.)
    if (penConfirmFrames < PEN_REQUIRED_FRAMES) {
      penConfirmFrames++;
      const display = `Esine havaittu (${penConfirmFrames}/${PEN_REQUIRED_FRAMES})…`;
      setStatus(display, "warn");
      drawOverlay({ mode: "guidePen", line: lockedLine, target, pen: ptr });
      return;
    }

    penMissFrames = 0;

    const dx   = ptr.tip.x - target.x;
    const dy   = ptr.tip.y - target.y;
    const dist = Math.hypot(dx, dy);
    const tol  = target.radius;

    let display, aria, tone;

    if (dist <= tol) {
      nearTargetFrames++;
      display = "Pysäytä ✓";
      aria    = "Pysäytä";
      tone    = "good";
      vibrate([100, 60, 100]);
    } else {
      nearTargetFrames = 0;

      // Annetaan ohje SUURIMMALLE erkanemiselle ensin
      if (Math.abs(dx) > Math.abs(dy) * 1.2) {
        display = dx > 0 ? "◀ Vasemmalle" : "Oikealle ▶";
        aria    = dx > 0 ? "Vasemmalle"   : "Oikealle";
        vibrate([25]);
      } else {
        display = dy > 0 ? "▲ Ylöspäin" : "▼ Alaspäin";
        aria    = dy > 0 ? "Ylöspäin"   : "Alaspäin";
        vibrate([25, 45, 25]);
      }
      tone = "warn";
    }

    announce(display, aria, tone);
    drawOverlay({ mode: "guidePen", line: lockedLine, target, pen: ptr });
  }

  // ── Piirto ────────────────────────────────────────────────────────────────

  function videoToScreen(x, y) {
    const r  = video.getBoundingClientRect();
    const vw = video.videoWidth || 1, vh = video.videoHeight || 1;
    const sc = Math.min(r.width / vw, r.height / vh);
    const ox = (r.width  - vw * sc) / 2;
    const oy = (r.height - vh * sc) / 2;
    return { x: ox + x * sc, y: oy + y * sc };
  }

  function drawOverlay({ mode: m, line, tone, target, pen }) {
    const r = video.getBoundingClientRect();
    ctx.clearRect(0, 0, r.width, r.height);

    // Ristikko
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = "rgba(255,255,255,.55)";
    ctx.setLineDash([7, 7]);
    ctx.beginPath();
    ctx.moveTo(r.width/2, 0);        ctx.lineTo(r.width/2, r.height);
    ctx.moveTo(0, r.height/2);       ctx.lineTo(r.width, r.height/2);
    ctx.stroke();
    ctx.setLineDash([]);

    if (!line) return;

    // Allekirjoitusviiva
    const p1 = videoToScreen(line.x1, line.y1);
    const p2 = videoToScreen(line.x2, line.y2);
    const pc = videoToScreen(line.cx, line.cy);
    const lineColor = tone === "good" || m === "guidePen"
      ? "rgba(0,230,118,.95)" : "rgba(255,213,79,.90)";
    ctx.lineWidth = 6;
    ctx.strokeStyle = lineColor;
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
    // Vasen reuna korostettu (sieltä allekirjoitus alkaa)
    ctx.fillStyle = lineColor;
    ctx.beginPath(); ctx.arc(p1.x, p1.y, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(pc.x, pc.y, 6, 0, Math.PI*2); ctx.fill();

    // Kohde
    if (target) {
      const t = videoToScreen(target.x, target.y);
      ctx.lineWidth = 3.5;
      ctx.strokeStyle = "rgba(255,128,171,.98)";
      ctx.fillStyle   = "rgba(255,128,171,.18)";
      ctx.beginPath(); ctx.arc(t.x, t.y, 20, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(t.x-26, t.y); ctx.lineTo(t.x+26, t.y);
      ctx.moveTo(t.x, t.y-26); ctx.lineTo(t.x, t.y+26);
      ctx.stroke();
    }

    // Havaittu kynä/veitsi
    if (pen && pen.tip) {
      const tp = videoToScreen(pen.tip.x, pen.tip.y);
      ctx.lineWidth   = 3.5;
      ctx.strokeStyle = "rgba(100,181,246,.98)";
      ctx.fillStyle   = "rgba(100,181,246,.95)";
      ctx.beginPath(); ctx.arc(tp.x, tp.y, 11, 0, Math.PI*2); ctx.fill();
      if (target) {
        const t = videoToScreen(target.x, target.y);
        ctx.beginPath(); ctx.moveTo(tp.x, tp.y); ctx.lineTo(t.x, t.y); ctx.stroke();
      }
    }
  }

  // ── Napit ─────────────────────────────────────────────────────────────────

  function updateBtns() {
    speakBtn.textContent  = speechOn  ? "Puhe päällä"  : "Puhe pois";
    vibrateBtn.textContent= vibrateOn ? "Värinä päällä": "Värinä pois";
    debugBtn.textContent  = debugOn   ? "Debug päällä" : "Debug pois";
    speakBtn.setAttribute("aria-pressed",   String(speechOn));
    vibrateBtn.setAttribute("aria-pressed", String(vibrateOn));
    debugBtn.setAttribute("aria-pressed",   String(debugOn));
    debugCanvas.style.display = debugOn ? "block" : "none";
  }

  startBtn.addEventListener("click",   startCamera);
  resetBtn.addEventListener("click",   () => resetAll(true));
  speakBtn.addEventListener("click",   () => { speechOn  = !speechOn;  if (!speechOn) speechSynthesis.cancel(); updateBtns(); });
  vibrateBtn.addEventListener("click", () => { vibrateOn = !vibrateOn; updateBtns(); });
  debugBtn.addEventListener("click",   () => { debugOn   = !debugOn;   updateBtns(); });
  window.addEventListener("resize",    resizeOverlay);
  window.addEventListener("beforeunload", () => {
    if (prevGray) prevGray.delete();
    if (stream) stream.getTracks().forEach(t => t.stop());
  });

  // ── OpenCV-valmius ─────────────────────────────────────────────────────────

  function markCvReady() {
    if (cvReady) return;
    cvReady = true;
    announce("Valmis — paina Aloita kamera", "Valmis", "good", true);
  }

  const _cvWait = setInterval(() => {
    if (window.cv && cv.Mat) { clearInterval(_cvWait); if (!cvReady) setTimeout(markCvReady, 150); }
  }, 200);
  if (window._cvReadyPending) markCvReady();

  updateBtns();
  setStatus("Ladataan kuvantunnistusta…", "warn");
  </script>
</body>
