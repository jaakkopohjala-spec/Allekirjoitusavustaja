<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Allekirjoitusavustin</title>
  <script>
    window.Module = {
      onRuntimeInitialized: function () {
        if (typeof markCvReady === "function") markCvReady();
        else window._cvReadyPending = true;
      }
    };
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505; --panel: #151515; --text: #fff;
      --muted: #bbb; --good: #00e676; --warn: #ffd54f; --bad: #ff5252;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; }

    /* ── Otsikko ── */
    header { padding: 10px 14px 8px; background: var(--panel); border-bottom: 1px solid #333; flex-shrink: 0; }
    h1 { font-size: 1rem; margin-bottom: 6px; }
    #status { font-size: 1.2rem; font-weight: 750; padding: 7px 11px; border-radius: 9px;
      background: #1e1e1e; border: 2px solid #555; line-height: 1.25; }
    #status.good { border-color: var(--good); }
    #status.warn { border-color: var(--warn); }
    #status.bad  { border-color: var(--bad); }
    #ariaAnnounce { position: absolute; width: 1px; height: 1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; }

    /* ── Kameranäkymä ── */
    main { position: relative; flex: 1; min-height: 0; background: #000; }
    video, #overlay { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
    #overlay { z-index: 2; pointer-events: none; }
    #debugCanvas { display: none; }

    /* ── Paneeli ── */
    #bottomPanel { background: var(--panel); border-top: 1px solid #333; flex-shrink: 0; }

    /* Nimikenttä-paneeli (vaihe 0) */
    #namePanel { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
    #namePanel label { font-size: .9rem; color: var(--muted); }
    #nameInput { width: 100%; padding: 10px 12px; border-radius: 9px; border: 2px solid #555;
      background: #1e1e1e; color: #fff; font-size: 1.1rem; -webkit-appearance: none; }
    #nameInput:focus { outline: none; border-color: var(--warn); }
    #nameInput::placeholder { color: #666; }

    /* Napit */
    #controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px 14px 14px; }
    button { min-height: 46px; border: 2px solid #666; border-radius: 10px; background: #222;
      color: #fff; font-size: .95rem; font-weight: 700; cursor: pointer; -webkit-appearance: none; }
    button:active { transform: scale(.97); }
    .wide { grid-column: 1/-1; }
    button:disabled { opacity: .4; cursor: default; }

    /* OCR-edistymispalkki */
    #ocrProgress { display: none; flex-direction: column; gap: 4px; padding: 8px 14px; }
    #ocrBar { height: 6px; border-radius: 3px; background: #333; overflow: hidden; }
    #ocrFill { height: 100%; width: 0%; background: var(--warn); border-radius: 3px;
      transition: width .3s; }
    #ocrLabel { font-size: .82rem; color: var(--muted); }

    /* OCR-tulospaneeli */
    #ocrResult { display: none; padding: 8px 14px; }
    #ocrResult p { font-size: .82rem; color: var(--muted); margin-bottom: 4px; }
    #ocrResultText { font-size: .88rem; color: #ddd; background: #1a1a1a; border-radius: 7px;
      padding: 7px 10px; max-height: 60px; overflow-y: auto; line-height: 1.4; }
    .highlight { background: rgba(255,213,79,.3); border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>Allekirjoitusavustin</h1>
    <div id="status" class="warn">Syötä nimi ja paina Aloita</div>
    <div id="ariaAnnounce" role="status" aria-live="assertive" aria-atomic="true"></div>
  </header>

  <main>
    <video id="video" playsinline muted></video>
    <canvas id="overlay"></canvas>
    <canvas id="debugCanvas"></canvas>
  </main>

  <div id="bottomPanel">
    <!-- Nimikenttä -->
    <div id="namePanel">
      <label for="nameInput">Haettava nimi paperilla:</label>
      <input id="nameInput" type="text" placeholder="esim. Matti Meikäläinen"
             autocomplete="off" autocorrect="off" spellcheck="false"
             aria-label="Haettava nimi">
    </div>

    <!-- OCR-edistyminen -->
    <div id="ocrProgress" aria-live="polite">
      <div id="ocrLabel">Ladataan kielimallia…</div>
      <div id="ocrBar"><div id="ocrFill"></div></div>
    </div>

    <!-- OCR-tulos -->
    <div id="ocrResult">
      <p>Tunnistettu teksti (haettu nimi korostettuna):</p>
      <div id="ocrResultText"></div>
    </div>

    <!-- Napit -->
    <div id="controls" aria-label="Ohjaimet">
      <button id="startBtn" class="wide">Aloita kamera ja etsi nimi</button>
      <button id="scanBtn"  class="wide" disabled>Skannaa paperi (OCR)</button>
      <button id="resetBtn">Etsi uudelleen</button>
      <button id="debugBtn"  aria-pressed="false">Debug pois</button>
    </div>
  </div>

  <!-- Tesseract.js — ladataan heti -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <!-- OpenCV — ei async -->
  <script src="https://docs.opencv.org/4.x/opencv.js"></script>

  <script>
  "use strict";

  // ── Elementit ──────────────────────────────────────────────────────────────
  const video        = document.getElementById("video");
  const overlay      = document.getElementById("overlay");
  const ctx          = overlay.getContext("2d");
  const debugCanvas  = document.getElementById("debugCanvas");
  const statusEl     = document.getElementById("status");
  const ariaEl       = document.getElementById("ariaAnnounce");
  const nameInput    = document.getElementById("nameInput");
  const namePanel    = document.getElementById("namePanel");
  const ocrProgress  = document.getElementById("ocrProgress");
  const ocrFill      = document.getElementById("ocrFill");
  const ocrLabel     = document.getElementById("ocrLabel");
  const ocrResult    = document.getElementById("ocrResult");
  const ocrResultText= document.getElementById("ocrResultText");
  const startBtn     = document.getElementById("startBtn");
  const scanBtn      = document.getElementById("scanBtn");
  const resetBtn     = document.getElementById("resetBtn");
  const debugBtn     = document.getElementById("debugBtn");

  // ── Tila ───────────────────────────────────────────────────────────────────
  let stream = null, running = false, cvReady = false;
  let debugOn = false;

  // mode: "searchLine" | "ocrScan" | "guidePen"
  let mode = "searchLine";

  // Viiva-tila
  let lockedLine = null, smoothedLine = null, stableFrames = 0;

  // Kynä-tila
  let prevGray = null, lastPenSeen = null, penMissFrames = 0;
  let penConfirmFrames = 0, nearTargetFrames = 0;

  // OCR-tila
  let ocrWorker = null;
  let ocrNameY  = null;   // Video-koordinaateissa: Y-sijainti löydetyn nimen alapuolella
  let ocrNameX1 = null;   // Nimen vasemman reunan X
  let ocrDone   = false;

  // Ilmoitukset
  let lastAriaText = "", lastAriaAt = 0;

  // Vakiot
  const PW               = 640;
  const DARK_THRESH      = 100;
  const BRIGHT_THRESH    = 195;
  const MOTION_THRESH    = 18;
  const PEN_REQUIRED     = 8;
  const CENTER_TOL_X     = 0.10;
  const CENTER_TOL_Y     = 0.12;
  const READY_FRAMES     = 10;
  const ARIA_MS          = 2000;

  // ── Ilmoitukset — vain aria-live, ei Web Speech API eikä värinä ──────────
  function setStatus(text, tone) {
    statusEl.textContent = text;
    statusEl.className   = tone || "warn";
  }
  function announceAria(text, force) {
    const now = Date.now();
    if (!force && text === lastAriaText) return;
    if (!force && now - lastAriaAt < ARIA_MS) return;
    lastAriaText = text; lastAriaAt = now;
    ariaEl.textContent = "";
    setTimeout(() => { ariaEl.textContent = text; }, 50);
  }
  function announce(display, aria, tone, force) {
    setStatus(display, tone || "warn");
    announceAria(aria, force);
  }

  // ── Canvas ─────────────────────────────────────────────────────────────────

  function resizeOverlay() {
    const r = video.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    overlay.width  = Math.max(1, Math.round(r.width  * dpr));
    overlay.height = Math.max(1, Math.round(r.height * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // ── Kamera ─────────────────────────────────────────────────────────────────

  async function startCamera() {
    const name = nameInput.value.trim();
    if (!name) {
      announce("Syötä ensin haettava nimi", "Syötä nimi", "bad", true);
      nameInput.focus();
      return;
    }
    if (!cvReady) {
      announce("Kuvantunnistus latautuu — odota", "Ladataan", "warn", true);
      return;
    }
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      video.addEventListener("loadedmetadata", resizeOverlay, { once: true });
      await video.play();
      resizeOverlay();
      resetTracking(false);
      running = true;
      startBtn.disabled = true;
      scanBtn.disabled  = false;
      announce("Kohdista paperi niin että nimi näkyy — paina sitten Skannaa",
               "Kohdista paperi ja paina Skannaa", "warn", true);
      setTimeout(loop, 100);
    } catch(e) {
      console.error(e);
      announce("Kameraa ei saatu — tarkista lupa", "Kamera ei toimi", "bad", true);
    }
  }

  function resetTracking(doAnnounce) {
    mode = "searchLine";
    lockedLine = null; smoothedLine = null; stableFrames = 0;
    lastPenSeen = null; penMissFrames = 0; penConfirmFrames = 0; nearTargetFrames = 0;
    ocrNameY = null; ocrNameX1 = null; ocrDone = false;
    lastAriaText = "";
    if (prevGray) { prevGray.delete(); prevGray = null; }
    ocrResult.style.display = "none";
    if (doAnnounce) announce("Kohdista paperi ja paina Skannaa", "Kohdista paperi", "warn", true);
  }

  // ── OCR ────────────────────────────────────────────────────────────────────
  // Otetaan still-kuva videosta, ajetaan Tesseract kerran,
  // etsitään nimen sijainti ja tallennetaan Y-koordinaatti.

  async function doOCR() {
    const name = nameInput.value.trim();
    if (!name || !running) return;

    mode = "ocrScan";
    scanBtn.disabled = true;
    ocrResult.style.display = "none";
    ocrProgress.style.display = "flex";
    ocrFill.style.width = "0%";
    ocrLabel.textContent = "Otetaan kuva…";

    // Kaappataan kuva videosta koko resoluutiolla
    const vw = video.videoWidth, vh = video.videoHeight;
    const snap = document.createElement("canvas");
    snap.width = vw; snap.height = vh;
    snap.getContext("2d").drawImage(video, 0, 0, vw, vh);
    const dataUrl = snap.toDataURL("image/jpeg", 0.92);

    try {
      // Alustetaan Tesseract-worker jos ei vielä
      if (!ocrWorker) {
        ocrLabel.textContent = "Ladataan kielimallia (kerran)…";
        ocrWorker = await Tesseract.createWorker("fin+swe+eng", 1, {
          logger: m => {
            if (m.status === "loading tesseract core") {
              ocrFill.style.width = "10%";
              ocrLabel.textContent = "Ladataan kielimallia…";
            } else if (m.status === "initializing tesseract") {
              ocrFill.style.width = "30%";
            } else if (m.status === "loading language traineddata") {
              ocrFill.style.width = "50%";
              ocrLabel.textContent = "Ladataan suomen kieltä…";
            } else if (m.status === "initializing api") {
              ocrFill.style.width = "75%";
            } else if (m.status === "recognizing text") {
              const pct = Math.round((m.progress || 0) * 100);
              ocrFill.style.width = (75 + pct * 0.25) + "%";
              ocrLabel.textContent = `Tunnistetaan tekstiä… ${pct}%`;
            }
          }
        });
      }

      ocrLabel.textContent = "Tunnistetaan tekstiä…";
      ocrFill.style.width = "80%";

      // Ajetaan OCR — pyydetään sanatasoa jotta saadaan koordinaatit
      const result = await ocrWorker.recognize(dataUrl, {}, {
        blocks: false, hocr: false, tsv: false, text: true, words: true
      });

      ocrFill.style.width = "100%";

      // Etsitään nimi sanoista (osittainen vastaavuus, case-insensitive)
      const words   = result.data.words || [];
      const nameLC  = name.toLowerCase();
      const nameParts = nameLC.split(/\s+/);

      // Etsitään peräkkäisiä sanoja jotka vastaavat nimeä
      let matchWords = [];
      for (let i = 0; i <= words.length - nameParts.length; i++) {
        const chunk = words.slice(i, i + nameParts.length);
        const matches = nameParts.every((part, j) =>
          chunk[j] && chunk[j].text.toLowerCase().includes(part.substring(0, 4))
        );
        if (matches) { matchWords = chunk; break; }
      }

      // Jos tarkkaa vastaavuutta ei löydy, kokeile yksittäistä osaa (sukunimi)
      if (matchWords.length === 0 && nameParts.length > 1) {
        const lastName = nameParts[nameParts.length - 1];
        for (const w of words) {
          if (w.text.toLowerCase().includes(lastName.substring(0, 5))) {
            matchWords = [w]; break;
          }
        }
      }

      // Näytetään tunnistettu teksti
      const fullText = result.data.text || "";
      showOcrResult(fullText, name, matchWords);

      if (matchWords.length === 0) {
        ocrLabel.textContent = "Nimeä ei löytynyt — kokeile uudelleen tai tarkista nimi";
        ocrProgress.style.display = "none";
        ocrResult.style.display = "block";
        announce("Nimeä ei löytynyt paperilta", "Nimeä ei löydy", "bad", true);
        mode = "searchLine";
        scanBtn.disabled = false;
        return;
      }

      // Lasketaan löydetyn nimen sijainti VIDEO-koordinaateissa
      // Tesseract palauttaa koordinaatit snap-canvasilla (= videokoordinaatit)
      const bbox = matchWords.reduce((acc, w) => ({
        x0: Math.min(acc.x0, w.bbox.x0),
        y0: Math.min(acc.y0, w.bbox.y0),
        x1: Math.max(acc.x1, w.bbox.x1),
        y1: Math.max(acc.y1, w.bbox.y1),
      }), { x0: Infinity, y0: Infinity, x1: -Infinity, y1: -Infinity });

      // Tallennetaan: allekirjoitusviiva on nimen ALAPUOLELLA
      // Etsitään viivaa väliltä nimen alareuna … + 15 % kuvan korkeudesta
      ocrNameY  = bbox.y1;      // nimen alareuna (video px)
      ocrNameX1 = bbox.x0;      // nimen vasen reuna
      ocrDone   = true;

      ocrProgress.style.display = "none";
      ocrResult.style.display   = "block";

      announce(
        `Nimi löytyi — kohdista ja etsi viiva`,
        "Nimi löytyi — etsi viiva",
        "good", true
      );
      mode = "searchLine";
      scanBtn.disabled = false;

    } catch(e) {
      console.error(e);
      ocrLabel.textContent = "OCR-virhe — yritä uudelleen";
      ocrProgress.style.display = "none";
      announce("Tekstintunnistus epäonnistui", "Virhe", "bad", true);
      mode = "searchLine";
      scanBtn.disabled = false;
    }
  }

  function showOcrResult(fullText, searchName, matchWords) {
    // Rakennetaan HTML jossa löydetyt sanat korostetaan
    const matchTexts = matchWords.map(w => w.text);
    let html = fullText
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    matchTexts.forEach(t => {
      const safe = t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      html = html.replace(new RegExp(safe, "gi"),
        m => `<span class="highlight">${m}</span>`);
    });
    ocrResultText.innerHTML = html;
  }

  // ── Pääsilmukka ───────────────────────────────────────────────────────────

  function loop() {
    if (!running) return;
    if (video.readyState < 2 || mode === "ocrScan") { setTimeout(loop, 120); return; }
    try {
      const frame = grabFrame();
      if (frame) {
        if (mode === "guidePen") {
          handlePenGuidance(frame);
        } else {
          const line = detectSignatureLine(frame);
          handleLineDetection(line);
        }
        frame.src.delete(); frame.gray.delete(); frame.blur.delete();
      }
    } catch(e) { console.error(e); }
    setTimeout(loop, 100);
  }

  // ── Kuvan kaappaus ─────────────────────────────────────────────────────────

  function grabFrame() {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) return null;
    const s = PW / vw, pw = PW, ph = Math.round(vh * s);
    debugCanvas.width = pw; debugCanvas.height = ph;
    const dc = debugCanvas.getContext("2d", { willReadFrequently: true });
    dc.drawImage(video, 0, 0, pw, ph);
    const src = cv.imread(debugCanvas);
    const gray = new cv.Mat(), blur = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray, blur, new cv.Size(5,5), 0);
    return { src, gray, blur, pw, ph, s };
  }

  // ── Paperin tunnistus ──────────────────────────────────────────────────────

  function detectPaper(frame) {
    const white = new cv.Mat(), kernel = cv.Mat.ones(15,15,cv.CV_8U);
    const closed = new cv.Mat(), contours = new cv.MatVector(), hier = new cv.Mat();
    try {
      cv.threshold(frame.gray, white, 170, 255, cv.THRESH_BINARY);
      cv.morphologyEx(white, closed, cv.MORPH_CLOSE, kernel);
      cv.findContours(closed, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
      let best = null, bestArea = 0;
      for (let i = 0; i < contours.size(); i++) {
        const c = contours.get(i), area = cv.contourArea(c);
        if (area > bestArea) { bestArea = area; best = cv.boundingRect(c); }
        c.delete();
      }
      if (!best || bestArea < frame.pw * frame.ph * 0.15) return null;
      return best;
    } finally { white.delete(); kernel.delete(); closed.delete(); contours.delete(); hier.delete(); }
  }

  // ── Allekirjoitusviivan tunnistus ──────────────────────────────────────────
  // Jos OCR on löytänyt nimen (ocrDone=true), rajoitetaan haku nimen
  // alapuolelle — tämä eliminoi tekstirivien sekoittumisen viivaan.

  function detectSignatureLine(frame) {
    const paper = detectPaper(frame);
    if (!paper) return null;

    // Lasketaan hakualue
    let searchY0 = paper.y;
    let searchY1 = paper.y + paper.height;

    if (ocrDone && ocrNameY != null) {
      // OCR löysi nimen: hae vain nimen alapuolelta (+ pieni margin)
      // ocrNameY on video-koordinaateissa → skaalataan prosessointitasolle
      const nameYproc = ocrNameY * frame.s;
      searchY0 = Math.max(paper.y, nameYproc - 5);
      // Rajataan enintään 20 % paperista alaspäin nimen alta
      searchY1 = Math.min(paper.y + paper.height, nameYproc + paper.height * 0.20);
    }

    const rx = Math.max(0, paper.x + 4);
    const ry = Math.max(0, searchY0);
    const rw = Math.min(frame.pw - rx, paper.x + paper.width - rx - 4);
    const rh = Math.min(frame.ph - ry, searchY1 - ry);
    if (rw < 50 || rh < 8) return null;

    const roiRect = new cv.Rect(rx, ry, rw, rh);
    const roiMat  = frame.blur.roi(roiRect);
    const edges   = new cv.Mat(), lines = new cv.Mat();

    try {
      cv.Canny(roiMat, edges, 35, 110, 3, false);
      const minLen = Math.round(rw * 0.20);
      cv.HoughLinesP(edges, lines, 1, Math.PI/180, 25, minLen, 10);

      const candidates = [];
      for (let i = 0; i < lines.rows; i++) {
        const x1 = lines.data32S[i*4]     + rx;
        const y1 = lines.data32S[i*4 + 1] + ry;
        const x2 = lines.data32S[i*4 + 2] + rx;
        const y2 = lines.data32S[i*4 + 3] + ry;
        const dx = x2-x1, dy = y2-y1;
        const len = Math.hypot(dx, dy);
        const angle = Math.abs(Math.atan2(dy,dx)*180/Math.PI);
        const hangle = Math.min(angle, Math.abs(180-angle));
        if (hangle > 6) continue;
        const cy = (y1+y2)/2;
        const yRel = (cy - paper.y) / paper.height;
        // Jos OCR-tieto käytössä, kaikki kandidaatit ovat jo oikealla alueella → pisteytys pelkällä pituudella
        const score = ocrDone ? len : len * (yRel > 0.45 ? (1+yRel) : yRel > 0.30 ? 0.6 : 0.2);
        candidates.push({ x1,y1,x2,y2, cx:(x1+x2)/2, cy, len, angle:hangle, yRel, score });
      }
      if (!candidates.length) return null;
      candidates.sort((a,b) => b.score - a.score);
      const b = candidates[0];
      const lx1 = b.x1<=b.x2?b.x1:b.x2, ly1 = b.x1<=b.x2?b.y1:b.y2;
      const lx2 = b.x1<=b.x2?b.x2:b.x1, ly2 = b.x1<=b.x2?b.y2:b.y1;
      return {
        x1:lx1/frame.s, y1:ly1/frame.s, x2:lx2/frame.s, y2:ly2/frame.s,
        cx:b.cx/frame.s, cy:b.cy/frame.s, length:b.len/frame.s,
        angle:b.angle, yRel:b.yRel, score:b.score,
        paper: { x:paper.x/frame.s, y:paper.y/frame.s, w:paper.width/frame.s, h:paper.height/frame.s }
      };
    } finally { roiMat.delete(); edges.delete(); lines.delete(); }
  }

  // ── Viivan suodatus ────────────────────────────────────────────────────────

  function updateSmoothed(raw) {
    if (!raw) {
      if (stableFrames > 0) stableFrames = Math.max(0, stableFrames-2);
      if (stableFrames === 0) smoothedLine = null;
      return smoothedLine;
    }
    if (!smoothedLine) { smoothedLine = Object.assign({},raw); stableFrames=1; return smoothedLine; }
    const jump = Math.hypot(raw.cx-smoothedLine.cx, raw.cy-smoothedLine.cy);
    if (jump > video.videoWidth*0.15) { smoothedLine=Object.assign({},raw); stableFrames=1; return smoothedLine; }
    const a=0.30;
    for (const k of ["x1","y1","x2","y2","cx","cy","length","angle"])
      smoothedLine[k] = smoothedLine[k]*(1-a)+raw[k]*a;
    smoothedLine.yRel=raw.yRel; smoothedLine.paper=raw.paper;
    stableFrames++;
    return smoothedLine;
  }

  // ── Viivan käsittely ───────────────────────────────────────────────────────

  function handleLineDetection(raw) {
    const line = updateSmoothed(raw);

    // Lisätään visuaalisesti nimen sijainti jos OCR on tehty
    if (ocrDone && ocrNameY != null) {
      drawOcrMarker();
    }

    if (!line) {
      const msg = ocrDone
        ? "Viivaa ei näy — tuo nimi keskemmälle"
        : "Viivaa ei näy — siirrä kamera";
      announce(msg, "Viivaa ei näy", "bad");
      drawOverlay({ mode:"none" });
      return;
    }

    const vw=video.videoWidth, vh=video.videoHeight;
    const dx=line.cx-vw/2, dy=line.cy-vh/2;
    const tolX=vw*CENTER_TOL_X, tolY=vh*CENTER_TOL_Y;
    const centered = Math.abs(dx)<=tolX && Math.abs(dy)<=tolY;

    if (!centered) {
      let display, aria;
      if (Math.abs(dx)>Math.abs(dy)) {
        display=dx<0?"◀ Vasemmalle":"Oikealle ▶"; aria=dx<0?"Vasemmalle":"Oikealle";
      } else {
        display=dy<0?"▲ Ylöspäin":"▼ Alaspäin"; aria=dy<0?"Ylöspäin":"Alaspäin";
      }
      stableFrames = Math.min(stableFrames, READY_FRAMES-1);
      announce(display, aria, "warn");
      drawOverlay({ mode:"line", line, tone:"warn" });
      return;
    }

    if (stableFrames >= READY_FRAMES+5) {
      lockedLine = Object.assign({}, line);
      mode = "guidePen";
      penConfirmFrames=0; penMissFrames=0; nearTargetFrames=0; lastPenSeen=null;
      lastAriaText="";
      const name = nameInput.value.trim();
      const msg = name ? `Kynäohjaus: ${name}` : "Kynäohjaus alkaa";
      announce(msg, "Kynäohjaus alkaa", "good", true);
      drawOverlay({ mode:"guidePen", line:lockedLine, target:computeTarget(lockedLine), pen:null });
      return;
    }
    announce(stableFrames>=READY_FRAMES?"Viiva keskellä ✓":"Viiva näkyy…",
             stableFrames>=READY_FRAMES?"Hyvä":"Viiva näkyy", "good");
    drawOverlay({ mode:"line", line, tone:"good" });
  }

  // ── Kohde ─────────────────────────────────────────────────────────────────
  // Tavoitepiste: 2,5 cm haetun nimen alkukirjaimen yläpuolelle.
  // Sallittu alue: 2 cm tavoitepisteestä joka suuntaan.
  //
  // A4-paperilla 2,5 cm ≈ 8,7 % paperin korkeudesta (297 mm).
  // 2 cm sallittu alue ≈ 6,7 % paperin korkeudesta.
  //
  // Jos OCR on löytänyt nimen (ocrNameX1, ocrNameY käytössä):
  //   - X = nimen vasen reuna (alkukirjaimen kohta)
  //   - Y = nimen yläreuna - 2,5 cm offset ylöspäin
  // Muuten käytetään viivan vasenta päätä kuten aiemmin.

  function computeTarget(line) {
    const paperH  = line.paper ? line.paper.h : video.videoHeight;
    const paperY  = line.paper ? line.paper.y : 0;

    // 2,5 cm ylöspäin: A4 297mm → 2,5/297 ≈ 8,4 %
    const upOffset   = paperH * 0.084;
    // Sallittu alue: 2 cm = 6,7 % paperin korkeudesta
    const tolerancePx = paperH * 0.067;

    let targetX, targetY;

    if (ocrDone && ocrNameX1 != null && ocrNameY != null) {
      // OCR-tieto käytössä: kohde nimen alkukirjaimen yläpuolella
      targetX = ocrNameX1;
      // ocrNameY on nimen alareuna (video-koordinaatit); käytetään nimen yläreunaa
      // Arvioidaan nimen korkeus: noin 4 % paperin korkeudesta
      const nameTopY = ocrNameY - paperH * 0.04;
      targetY = nameTopY - upOffset;
    } else {
      // Ei OCR-tietoa: käytetään viivan vasenta päätä
      const dx = line.x2 - line.x1, dy = line.y2 - line.y1;
      const len = Math.max(1, Math.hypot(dx, dy));
      let nx = -dy/len, ny = dx/len;
      if (ny > 0) { nx = -nx; ny = -ny; }
      targetX = line.x1 + Math.max(4, len*0.02);
      targetY = line.y1 + ny * upOffset;
    }

    return { x: targetX, y: targetY, radius: tolerancePx };
  }

  // ── Kynä/esineen tunnistus ─────────────────────────────────────────────────

  function detectPointer(frame, target, line) {
    const currGray=frame.gray, scale=frame.s;
    let motion=new cv.Mat(), darkM=new cv.Mat(), lightM=new cv.Mat();
    let combined=new cv.Mat(), kernel=cv.Mat.ones(3,3,cv.CV_8U);
    let contours=new cv.MatVector(), hier=new cv.Mat();
    try {
      if (!prevGray) { prevGray=currGray.clone(); return null; }
      const diff=new cv.Mat();
      cv.absdiff(currGray,prevGray,diff);
      cv.threshold(diff,motion,MOTION_THRESH,255,cv.THRESH_BINARY); diff.delete();
      cv.threshold(currGray,darkM,DARK_THRESH,255,cv.THRESH_BINARY_INV);
      cv.threshold(currGray,lightM,BRIGHT_THRESH,255,cv.THRESH_BINARY);
      if (nearTargetFrames>0) {
        cv.bitwise_or(darkM,lightM,combined);
      } else {
        const dm=new cv.Mat(), lm=new cv.Mat();
        cv.bitwise_and(darkM,motion,dm); cv.bitwise_and(lightM,motion,lm);
        cv.bitwise_or(dm,lm,combined); dm.delete(); lm.delete();
      }
      cv.morphologyEx(combined,combined,cv.MORPH_CLOSE,kernel);
      cv.dilate(combined,combined,kernel,new cv.Point(-1,-1),1);
      prevGray.delete(); prevGray=currGray.clone();
      cv.findContours(combined,contours,hier,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE);
      const tx=target.x*scale, ty=target.y*scale;
      const lineY=((line.y1+line.y2)/2)*scale;
      let best=null;
      for (let i=0;i<contours.size();i++) {
        const c=contours.get(i), area=cv.contourArea(c);
        if (area<20||area>frame.pw*frame.ph*0.10){c.delete();continue;}
        const r=cv.boundingRect(c);
        const long=Math.max(r.width,r.height), short=Math.max(1,Math.min(r.width,r.height));
        const elong=long/short;
        if (long<12||elong<1.3){c.delete();continue;}
        const cy2=r.y+r.height/2;
        const abovePref=cy2<lineY+frame.ph*0.10?1.0:0.4;
        let tipPt={x:(r.x+r.width/2),y:cy2}, minD=Infinity;
        for (let j=0;j<c.data32S.length;j+=2){
          const px=c.data32S[j],py=c.data32S[j+1];
          const d=Math.hypot(px-tx,py-ty);
          if(d<minD){minD=d;tipPt={x:px,y:py};}
        }
        const score=(area*Math.min(elong,6)*abovePref)/Math.max(15,minD);
        if(!best||score>best.score)
          best={score,area,tip:{x:tipPt.x/scale,y:tipPt.y/scale},dist:minD/scale};
        c.delete();
      }
      if (!best&&lastPenSeen&&Date.now()-lastPenSeen.seenAt<700) return lastPenSeen;
      if (best) best.seenAt=Date.now();
      return best;
    } finally {
      motion.delete();darkM.delete();lightM.delete();
      combined.delete();kernel.delete();contours.delete();hier.delete();
    }
  }

  // ── Kynäohjaus ────────────────────────────────────────────────────────────

  function handlePenGuidance(frame) {
    const rawLine=detectSignatureLine(frame);
    if (rawLine) {
      const jump=Math.hypot(rawLine.cx-lockedLine.cx,rawLine.cy-lockedLine.cy);
      if (jump<video.videoWidth*0.12) {
        const a=0.08;
        for(const k of["x1","y1","x2","y2","cx","cy","length","angle"])
          lockedLine[k]=lockedLine[k]*(1-a)+rawLine[k]*a;
        if(rawLine.paper) lockedLine.paper=rawLine.paper;
      }
    }
    const target=computeTarget(lockedLine);
    const ptr=detectPointer(frame,target,lockedLine);
    if (!ptr) {
      penConfirmFrames=0; penMissFrames++; nearTargetFrames=0;
      const display=penMissFrames>15?"Tuo kynä tai veitsi näkyviin":"Tuo esine näkyviin";
      announce(display,"Tuo esine","warn");
      drawOverlay({mode:"guidePen",line:lockedLine,target,pen:null});
      return;
    }
    lastPenSeen=ptr;
    if (penConfirmFrames<PEN_REQUIRED) {
      penConfirmFrames++;
      setStatus(`Esine havaittu (${penConfirmFrames}/${PEN_REQUIRED})…`,"warn");
      drawOverlay({mode:"guidePen",line:lockedLine,target,pen:ptr});
      return;
    }
    penMissFrames=0;
    const dx=ptr.tip.x-target.x, dy=ptr.tip.y-target.y;
    const dist=Math.hypot(dx,dy);
    let display,aria,tone;
    if (dist<=target.radius) {
      nearTargetFrames++;
      display="Kohdistettu ✓"; aria="Kohdistettu"; tone="good";
    } else {
      nearTargetFrames=0;
      if (Math.abs(dx)>Math.abs(dy)*1.2) {
        display=dx>0?"◀ Vasemmalle":"Oikealle ▶"; aria=dx>0?"Vasemmalle":"Oikealle";
      } else {
        display=dy>0?"▲ Ylöspäin":"▼ Alaspäin"; aria=dy>0?"Ylöspäin":"Alaspäin";
      }
      tone="warn";
    }
    announce(display,aria,tone);
    drawOverlay({mode:"guidePen",line:lockedLine,target,pen:ptr});
  }

  // ── Piirto ─────────────────────────────────────────────────────────────────

  function videoToScreen(x,y) {
    const r=video.getBoundingClientRect();
    const vw=video.videoWidth||1, vh=video.videoHeight||1;
    const sc=Math.min(r.width/vw,r.height/vh);
    const ox=(r.width-vw*sc)/2, oy=(r.height-vh*sc)/2;
    return {x:ox+x*sc,y:oy+y*sc};
  }

  // Piirtää vaakaviivan OCR:n löytämän nimen kohdalle
  function drawOcrMarker() {
    if (!ocrNameY) return;
    const r=video.getBoundingClientRect();
    const vw=video.videoWidth||1, vh=video.videoHeight||1;
    const sc=Math.min(r.width/vw,r.height/vh);
    const ox=(r.width-vw*sc)/2, oy=(r.height-vh*sc)/2;
    const screenY=oy+ocrNameY*sc;
    const screenX=ox+(ocrNameX1||0)*sc;
    // Piirretään katkoviiva nimen alapuolelle (sieltä allekirjoitusviiva etsitään)
    ctx.save();
    ctx.lineWidth=2;
    ctx.strokeStyle="rgba(100,181,246,.7)";
    ctx.setLineDash([6,5]);
    ctx.beginPath();
    ctx.moveTo(ox,screenY); ctx.lineTo(ox+vw*sc,screenY);
    ctx.stroke();
    ctx.setLineDash([]);
    // Teksti
    ctx.fillStyle="rgba(100,181,246,.9)";
    ctx.font="bold 13px system-ui,sans-serif";
    ctx.fillText("↓ Nimi löytyi tältä kohtaa", screenX+4, screenY-5);
    ctx.restore();
  }

  function drawOverlay({mode:m, line, tone, target, pen}) {
    const r=video.getBoundingClientRect();
    ctx.clearRect(0,0,r.width,r.height);

    // OCR-merkki
    if (ocrDone&&ocrNameY) drawOcrMarker();

    // Ristikko
    ctx.lineWidth=2.5; ctx.strokeStyle="rgba(255,255,255,.45)"; ctx.setLineDash([7,7]);
    ctx.beginPath();
    ctx.moveTo(r.width/2,0); ctx.lineTo(r.width/2,r.height);
    ctx.moveTo(0,r.height/2); ctx.lineTo(r.width,r.height/2);
    ctx.stroke(); ctx.setLineDash([]);

    if (!line) return;
    const p1=videoToScreen(line.x1,line.y1), p2=videoToScreen(line.x2,line.y2);
    const pc=videoToScreen(line.cx,line.cy);
    const lineColor=tone==="good"||m==="guidePen"?"rgba(0,230,118,.95)":"rgba(255,213,79,.90)";
    ctx.lineWidth=6; ctx.strokeStyle=lineColor;
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
    ctx.fillStyle=lineColor;
    ctx.beginPath(); ctx.arc(p1.x,p1.y,8,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(pc.x,pc.y,6,0,Math.PI*2); ctx.fill();

    if (target) {
      const t=videoToScreen(target.x,target.y);
      ctx.lineWidth=3.5; ctx.strokeStyle="rgba(255,128,171,.98)"; ctx.fillStyle="rgba(255,128,171,.18)";
      ctx.beginPath(); ctx.arc(t.x,t.y,20,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(t.x-26,t.y); ctx.lineTo(t.x+26,t.y);
      ctx.moveTo(t.x,t.y-26); ctx.lineTo(t.x,t.y+26);
      ctx.stroke();
    }
    if (pen&&pen.tip) {
      const tp=videoToScreen(pen.tip.x,pen.tip.y);
      ctx.lineWidth=3.5; ctx.strokeStyle="rgba(100,181,246,.98)"; ctx.fillStyle="rgba(100,181,246,.95)";
      ctx.beginPath(); ctx.arc(tp.x,tp.y,11,0,Math.PI*2); ctx.fill();
      if (target) {
        const t=videoToScreen(target.x,target.y);
        ctx.beginPath(); ctx.moveTo(tp.x,tp.y); ctx.lineTo(t.x,t.y); ctx.stroke();
      }
    }
  }

  // ── Napit ─────────────────────────────────────────────────────────────────

  function updateBtns() {
    debugBtn.textContent  =debugOn  ?"Debug päällä" :"Debug pois";
    debugBtn.setAttribute("aria-pressed",String(debugOn));
    debugCanvas.style.display=debugOn?"block":"none";
  }

  startBtn.addEventListener("click", startCamera);
  scanBtn.addEventListener("click",  doOCR);
  resetBtn.addEventListener("click", () => {
    resetTracking(true);
    scanBtn.disabled = !running;
    startBtn.disabled = running;
  });
  debugBtn.addEventListener("click",   ()=>{ debugOn=!debugOn; updateBtns(); });
  window.addEventListener("resize", resizeOverlay);
  window.addEventListener("beforeunload", ()=>{
    if(prevGray)prevGray.delete();
    if(stream)stream.getTracks().forEach(t=>t.stop());
    if(ocrWorker)ocrWorker.terminate();
  });

  // ── OpenCV-valmius ─────────────────────────────────────────────────────────

  function markCvReady() {
    if (cvReady) return;
    cvReady = true;
    announce("Valmis — syötä nimi ja paina Aloita", "Valmis", "good", true);
  }
  const _cvWait=setInterval(()=>{
    if(window.cv&&cv.Mat){clearInterval(_cvWait);if(!cvReady)setTimeout(markCvReady,150);}
  },200);
  if(window._cvReadyPending) markCvReady();

  updateBtns();
  setStatus("Ladataan kuvantunnistusta…","warn");
  </script>
</body>
</html>
